<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="keywords" content="MSME loan Ahmedabad, bank loan proposal Gujarat, DPR preparation India, SARFAESI enforcement, project finance consultant, ESG advisory India, startup funding Ahmedabad, Rakesh Jha SCG">
<meta property="og:title" content="Shiva Financial Solutions | Expert Financial Advisory">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    /* SCG Brand — Navy + Gold + SCG Blue-Green */
    --navy:       #071220;
    --navy2:      #0C1C35;
    --navy3:      #122444;
    --scg-blue:   #3B5EA6;
    --scg-green:  #4A9A3C;
    --gold:       #C9A84C;
    --gold2:      #E8C96A;
    --gold-dim:   rgba(201,168,76,0.12);
    --white:      #FFFFFF;
    --off-white:  #F6F4EF;
    --text-mid:   #B0C0D8;
    --text-muted: #6B80A0;
    --border:     rgba(201,168,76,0.18);
    --border2:    rgba(59,94,166,0.25);
    --shadow-lg:  0 24px 64px rgba(7,18,32,0.7);
    --shadow-md:  0 8px 32px rgba(7,18,32,0.5);
    --radius:     3px;
    --transition: 0.28s cubic-bezier(0.4,0,0.2,1);
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; font-size: 16px; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--white);
    overflow-x: hidden;
    line-height: 1.6;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--navy); }
  ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }

  /* TEXTURE OVERLAY */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999; opacity: 0.4;
  }

  /* NAVIGATION */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 900; height: 76px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 48px;
    background: rgba(7,18,32,0.95);
    backdrop-filter: blur(24px) saturate(180%);
    border-bottom: 1px solid var(--border);
    transition: height var(--transition), background var(--transition);
  }
  nav.scrolled { height: 62px; background: rgba(4,12,22,0.98); }

  .nav-brand { display: flex; align-items: center; gap: 14px; text-decoration: none; }
  .nav-logo-img {
    height: 44px; width: auto;
    filter: brightness(0) invert(1);
    opacity: 0.92;
    transition: opacity var(--transition);
  }
  nav.scrolled .nav-logo-img { height: 36px; }
  .nav-brand:hover .nav-logo-img { opacity: 1; }
  .nav-brand-divider {
    width: 1px; height: 32px;
    background: linear-gradient(to bottom, transparent, var(--border), transparent);
  }
  .nav-brand-text { display: flex; flex-direction: column; gap: 2px; }
  .nav-brand-main {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem; font-weight: 700;
    color: var(--gold); letter-spacing: 0.04em; line-height: 1;
  }
  .nav-brand-sub {
    font-size: 0.58rem; font-weight: 500;
    color: var(--text-muted); letter-spacing: 0.2em; text-transform: uppercase;
  }
  .nav-center { display: flex; align-items: center; gap: 6px; list-style: none; }
  .nav-center a {
    color: var(--text-mid); text-decoration: none;
    font-size: 0.8rem; font-weight: 500;
    letter-spacing: 0.07em; text-transform: uppercase;
    padding: 6px 14px; border-radius: var(--radius);
    transition: color var(--transition), background var(--transition);
  }
  .nav-center a:hover { color: var(--gold); background: var(--gold-dim); }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .nav-phone {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.8rem; font-weight: 600;
    color: var(--text-mid); text-decoration: none;
    border: 1px solid var(--border2);
    padding: 7px 16px; border-radius: var(--radius);
    transition: all var(--transition);
  }
  .nav-phone:hover { color: var(--white); border-color: var(--scg-blue); background: rgba(59,94,166,0.15); }
  .nav-phone-icon { font-size: 0.75rem; color: var(--scg-blue); }
  .btn-nav-cta {
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: var(--navy) !important; text-decoration: none;
    padding: 9px 22px; border-radius: var(--radius);
    font-size: 0.78rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    transition: all var(--transition); border: none; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-nav-cta:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(201,168,76,0.4); }
  .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; }
  .hamburger span { width: 22px; height: 2px; background: var(--text-mid); border-radius: 2px; transition: all 0.3s; }

  /* HERO */
  .hero {
    min-height: 100vh; display: flex; align-items: center;
    padding: 110px 48px 80px; position: relative; overflow: hidden;
  }
  .hero::before {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 90% 70% at 65% 35%, rgba(59,94,166,0.12) 0%, transparent 55%),
      radial-gradient(ellipse 50% 60% at 5% 90%, rgba(74,154,60,0.06) 0%, transparent 50%),
      radial-gradient(ellipse 40% 50% at 90% 10%, rgba(201,168,76,0.07) 0%, transparent 50%),
      linear-gradient(160deg, #071220 0%, #0C1C35 45%, #071220 100%);
  }
  .hero-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(59,94,166,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,94,166,0.04) 1px, transparent 1px);
    background-size: 64px 64px;
  }
  .hero-orb1 {
    position: absolute; top: 15%; right: 8%;
    width: 380px; height: 380px; border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.08);
    animation: slow-spin 35s linear infinite;
  }
  .hero-orb1::before { content: ''; position: absolute; inset: 28px; border-radius: 50%; border: 1px solid rgba(59,94,166,0.08); }
  .hero-orb1::after  { content: ''; position: absolute; inset: 56px; border-radius: 50%; border: 1px solid rgba(74,154,60,0.06); }
  .hero-orb2 {
    position: absolute; bottom: 10%; right: 22%;
    width: 160px; height: 160px; border-radius: 50%;
    background: radial-gradient(circle, rgba(59,94,166,0.08), transparent 70%);
    animation: pulse-soft 4s ease-in-out infinite;
  }
  @keyframes slow-spin { to { transform: rotate(360deg); } }
  @keyframes pulse-soft { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.15); opacity: 1; } }
  .hero-content { position: relative; z-index: 2; max-width: 680px; }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(59,94,166,0.15); border: 1px solid rgba(59,94,166,0.35);
    border-radius: 30px; padding: 6px 16px;
    font-size: 0.7rem; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase;
    color: #7CA4E0; margin-bottom: 28px; animation: fadeInUp 0.6s ease-out both;
  }
  .hero-badge-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--scg-green);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot { 0%, 100% { box-shadow: 0 0 0 0 rgba(74,154,60,0.6); } 50% { box-shadow: 0 0 0 5px rgba(74,154,60,0); } }
  .hero-h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.8rem, 5.5vw, 5.2rem);
    font-weight: 700; line-height: 1.04; color: var(--white); margin-bottom: 10px;
    animation: fadeInUp 0.7s 0.1s ease-out both;
  }
  .hero-h1 em { font-style: italic; color: var(--gold); }
  .hero-h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.4rem, 2.8vw, 2.4rem);
    font-weight: 400; font-style: italic; color: var(--text-mid); margin-bottom: 28px; line-height: 1.25;
    animation: fadeInUp 0.7s 0.2s ease-out both;
  }
  .hero-desc {
    font-size: 1rem; font-weight: 300; line-height: 1.75;
    color: rgba(176,192,216,0.85); max-width: 540px; margin-bottom: 40px;
    animation: fadeInUp 0.7s 0.3s ease-out both;
  }
  .hero-actions { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 52px; animation: fadeInUp 0.7s 0.4s ease-out both; }
  .btn-gold {
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
    color: var(--navy); padding: 15px 34px;
    font-size: 0.85rem; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase;
    border: none; cursor: pointer; text-decoration: none;
    display: inline-flex; align-items: center; gap: 8px;
    border-radius: var(--radius); transition: all var(--transition);
  }
  .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(201,168,76,0.45); }
  .btn-ghost {
    background: transparent; color: var(--white);
    padding: 14px 30px; font-size: 0.85rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
    border: 1px solid rgba(255,255,255,0.2); cursor: pointer; text-decoration: none;
    display: inline-flex; align-items: center; gap: 8px;
    border-radius: var(--radius); transition: all var(--transition);
  }
  .btn-ghost:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
  .hero-stats {
    display: flex; gap: 0; flex-wrap: wrap;
    border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; background: rgba(12,28,53,0.6); backdrop-filter: blur(10px);
    animation: fadeInUp 0.7s 0.5s ease-out both; max-width: 580px;
  }
  .hero-stat {
    flex: 1; padding: 18px 24px; border-right: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 3px; transition: background var(--transition);
  }
  .hero-stat:last-child { border-right: none; }
  .hero-stat:hover { background: rgba(201,168,76,0.06); }
  .stat-num { font-family: 'Cormorant Garamond', serif; font-size: 1.75rem; font-weight: 700; color: var(--gold); line-height: 1; }
  .stat-label { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }
